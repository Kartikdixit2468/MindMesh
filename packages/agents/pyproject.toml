[project]
name = "monadblitz-agents"
version = "0.1.0"
requires-python = ">=3.10"
dependencies = [
    "anthropic>=0.49.0",
    "openai>=1.58.0",
    "groq>=0.13.0",
    "redis>=5.2.0",
    "aiohttp>=3.10.0",
    "pydantic>=2.10.0",
    "pydantic-settings>=2.0.0",
    "python-dotenv>=1.0.0",
    "rich>=13.9.0",
    "eth-account>=0.13.0",
    "web3>=7.0.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/agents"]

[project.scripts]
run-agents = "agents.launcher:main"
run-alpha = "agents.alpha_runner:main"
run-beta = "agents.beta_runner:main"
run-gamma = "agents.gamma_runner:main"
