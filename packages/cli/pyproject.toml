[project]
name = "monadblitz-cli"
version = "0.1.0"
requires-python = ">=3.10"
dependencies = [
    "textual>=0.87.0",
    "redis>=5.0.0",
    "aiohttp>=3.10.0",
    "rich>=13.9.0",
    "pydantic-settings>=2.0.0",
    "python-dotenv>=1.0.0",
    "websockets>=14.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/cli"]

[project.scripts]
monadblitz-cli = "cli.main:main"
